name: Executar API
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependências
        run: |
          pip install requests pandas gspread oauth2client

      - name: Criar arquivo de credenciais
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > teste-477018-5cb1426a435b.json

      - name: Rodar script
        run: python API_MB1.py
        env:
          TOKEN_SGA: ${{ secrets.TOKEN_SGA }}
          USUARIO_API: ${{ secrets.USUARIO_API }}
          SENHA_API: ${{ secrets.SENHA_API }}
          TOKEN_CRM: ${{ secrets.TOKEN_CRM }}
